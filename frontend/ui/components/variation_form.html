<form aria-labelledby="form-title">
  <h2 id="form-title">Add Historical Variation</h2>
  <label for="variation-content">Historical Data Content</label>
  <textarea id="variation-content" required></textarea>
  
  <label for="parent-select">Select Ancestor (Optional)</label>
  <select id="parent-select" aria-describedby="parent-help">
    </select>
  <span id="parent-help">Selecting an ancestor maps this to the lineage tree.</span>
  
  <button type="submit">Commit to Lineage</button>
</form>
